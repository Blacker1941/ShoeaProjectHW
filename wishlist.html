<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>My Wishlist</title>
  <style>
    ::-webkit-scrollbar { display: none; }
    body { font-family: sans-serif; }
    #filters { scrollbar-width: none; -ms-overflow-style: none; }
  </style>
</head>
<body class="bg-white">

  <div class="max-w-[390px] mx-auto min-h-screen bg-white">

    <!-- Header -->
    <div class="flex items-center justify-between px-5 pt-10 pb-4">
      <div class="flex items-center gap-3">
        <button onclick="history.back()"
          class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 text-gray-700 font-semibold text-lg">
          &#8592;
        </button>
        <h1 class="font-bold text-xl text-gray-900">My Wishlist</h1>
      </div>
      <button class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 text-gray-600 text-base">
        &#128269;
      </button>
    </div>

    <!-- Filters -->
    <div id="filters" class="flex gap-2 px-5 overflow-x-auto pb-3"></div>

    <!-- Products -->
    <div id="products" class="grid grid-cols-2 gap-3 px-5 mt-3 pb-10"></div>

    <!-- Empty state -->
    <div id="empty" class="hidden text-center py-20 px-5">
      <p class="text-4xl mb-3">♡</p>
      <p class="text-gray-500 font-medium">Your wishlist is empty</p>
      <p class="text-gray-400 text-sm mt-1">Save items you love by tapping the heart icon.</p>
      <button onclick="location.href='home.html'"
        class="mt-6 bg-gray-900 text-white px-8 py-3 rounded-full text-sm font-semibold">
        Browse Shoes
      </button>
    </div>

  </div>

  <script src="./js/wishlist.js"></script>
</body>
</html>
