<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { display: none; }
    body { font-family: sans-serif; }
    #filters { scrollbar-width: none; -ms-overflow-style: none; }
    .star-filled { color: #facc15; }
    .result-card { transition: transform 0.2s; }
    .result-card:hover { transform: scale(1.02); }
  </style>
</head>

<body class="bg-[#f0f0f0] flex justify-center min-h-screen">

  <div class="w-[390px] bg-white min-h-screen relative overflow-hidden flex flex-col">

    <!-- HEADER / SEARCH BAR -->
    <div class="px-5 pt-10 pb-4 border-b border-gray-100">
      <div class="flex items-center gap-3">
        <button onclick="history.back()" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="relative flex-1">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
          <input id="searchInput" type="text" placeholder="Search shoes..."
            class="w-full bg-gray-100 rounded-2xl pl-9 pr-10 py-3 outline-none text-sm text-gray-800 placeholder-gray-400"
            autocomplete="off">
          <button id="clearBtn" onclick="clearSearch()"
            class="absolute right-3 top-1/2 -translate-y-1/2 hidden text-gray-400 hover:text-gray-700">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <button class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- PANELS -->
    <div class="flex-1 overflow-y-auto pb-28">

      <!-- ① RECENT SEARCHES PANEL -->
      <div id="recentPanel" class="px-5 pt-5">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-bold text-base text-gray-900">Recent</h2>
          <button onclick="clearAll()" class="text-xs text-gray-500 font-medium hover:text-red-500 transition-colors">Clear All</button>
        </div>
        <ul id="recentList" class="flex flex-col gap-1"></ul>
      </div>

      <!-- ② NOT FOUND PANEL -->
      <div id="notFoundPanel" class="hidden flex-col items-center justify-center px-8 pt-20 text-center">
        <!-- Clipboard icon -->
        <svg width="100" height="110" viewBox="0 0 100 110" fill="none" xmlns="http://www.w3.org/2000/svg" class="mb-6 opacity-80">
          <!-- Back clipboard -->
          <rect x="22" y="18" width="56" height="72" rx="8" fill="#e5e7eb" transform="rotate(-8 22 18)"/>
          <!-- Front clipboard -->
          <rect x="18" y="22" width="56" height="72" rx="8" fill="#f3f4f6"/>
          <rect x="18" y="22" width="56" height="72" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
          <!-- Clip top -->
          <rect x="34" y="16" width="24" height="14" rx="5" fill="#d1d5db"/>
          <rect x="38" y="20" width="16" height="6" rx="3" fill="#9ca3af"/>
          <!-- Lines on clipboard -->
          <rect x="28" y="44" width="36" height="3" rx="1.5" fill="#d1d5db"/>
          <rect x="28" y="53" width="28" height="3" rx="1.5" fill="#d1d5db"/>
          <rect x="28" y="62" width="32" height="3" rx="1.5" fill="#d1d5db"/>
        </svg>
        <h3 class="font-bold text-lg text-gray-800 mb-2">Not Found</h3>
        <p class="text-sm text-gray-400 leading-relaxed">
          Sorry, the keyword you entered cannot be found. Please check again or search with another keyword.
        </p>
      </div>

      <!-- ③ RESULTS PANEL -->
      <div id="resultsPanel" class="hidden px-5 pt-5">
        <div class="flex justify-between items-center mb-4">
          <h2 id="resultsTitle" class="font-bold text-base text-gray-900">Results for ""</h2>
          <span id="resultsCount" class="text-xs text-gray-400 font-medium"></span>
        </div>
        <!-- Filter pills -->
        <div id="resultFilters" class="flex gap-2 mb-4 overflow-x-auto pb-1" style="scrollbar-width:none"></div>
        <!-- Grid -->
        <div id="resultsGrid" class="grid grid-cols-2 gap-3"></div>
      </div>

    </div>

    <!-- BOTTOM NAV -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[390px] bg-white border-t border-gray-100 flex justify-around items-center py-3 z-50">
      <button onclick="location.href='home.html'" class="flex flex-col items-center gap-0.5" onclick="location.href='index.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M3 12l9-9 9 9"/><path d="M9 21V12h6v9"/></svg>
        <span class="text-[10px] text-gray-400">Home</span>
      </button>
      <button onclick="location.href='cart.html'" class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="text-[10px] text-gray-400">Cart</span>
      </button>
      <button onclick="location.href='orders.html'" class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
        <span class="text-[10px] text-gray-400">Orders</span>
      </button>
      <button class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        <span class="text-[10px] text-gray-400">Wallet</span>
      </button>
      <button class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="text-[10px] text-gray-400">Profile</span>
      </button>
    </div>

  </div>

  <script>
    /* ─── State ─── */
    let allProducts = [];
    let wishlist    = JSON.parse(localStorage.getItem("wishlist") || "[]");
    let recentSearches = JSON.parse(localStorage.getItem("recentSearches") || "[]");

    const searchInput   = document.getElementById("searchInput");
    const clearBtn      = document.getElementById("clearBtn");
    const recentPanel   = document.getElementById("recentPanel");
    const notFoundPanel = document.getElementById("notFoundPanel");
    const resultsPanel  = document.getElementById("resultsPanel");

    /* ─── Sample products (fallback if no server) ─── */
    const sampleProducts = [
      { id: 1, title: "Nike Wrapshot Classic", brand: "Nike",        price: 120, rating: 4.5, sold: 8374, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff" },
      { id: 2, title: "Puma Running Sneakers",  brand: "Puma",        price: 95,  rating: 4.3, sold: 5100, image: "https://images.unsplash.com/photo-1608231387042-66d1773070a5" },
      { id: 3, title: "Nike Air Force 1",        brand: "Nike",        price: 110, rating: 4.7, sold: 12000,image: "https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb" },
      { id: 4, title: "Adidas Walking Sneakers", brand: "Adidas",      price: 90,  rating: 4.4, sold: 7800, image: "https://images.unsplash.com/photo-1539185441755-769473a23570" },
      { id: 5, title: "K-Swiss Court Northam",   brand: "Asics",       price: 105, rating: 4.5, sold: 3300, image: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa" },
      { id: 6, title: "Nike Air Jordan XXXVI",   brand: "Nike",        price: 185, rating: 4.8, sold: 9200, image: "https://images.unsplash.com/photo-1584735175315-9d5df23be620" },
      { id: 7, title: "Fila Windshift 15",        brand: "Reebok",      price: 75,  rating: 4.1, sold: 2900, image: "https://images.unsplash.com/photo-1595341888016-a392ef81b7de" },
      { id: 8, title: "Puma Suede Classic",       brand: "Puma",        price: 85,  rating: 4.3, sold: 6700, image: "https://images.unsplash.com/photo-1560769629-975ec94e6a86" },
      { id: 9, title: "Adidas Running Sneakers",  brand: "Adidas",      price: 135, rating: 4.3, sold: 6937, image: "https://images.unsplash.com/photo-1562183241-b937e95585b6" },
      { id:10, title: "RS-X Running Sneakers",    brand: "Puma",        price: 80,  rating: 4.9, sold: 8074, image: "https://images.unsplash.com/photo-1549298916-b41d501d3772" },
    ];

    const filterBrands = ["All", "Nike", "Adidas", "Puma", "Asics", "Reebok"];
    let activeFilter = "All";

    /* ─── Init ─── */
    async function init() {
      try {
        const res = await fetch("http://localhost:3000/products");
        allProducts = await res.json();
      } catch {
        allProducts = sampleProducts;
      }
      renderRecent();
      showPanel("recent");
    }

    /* ─── Panel switcher ─── */
    function showPanel(which) {
      recentPanel.classList.toggle("hidden", which !== "recent");
      notFoundPanel.classList.toggle("hidden", which !== "notfound");
      notFoundPanel.classList.toggle("flex", which === "notfound");
      resultsPanel.classList.toggle("hidden", which !== "results");
    }

    /* ─── Recent searches ─── */
    function renderRecent() {
      const list = document.getElementById("recentList");
      if (recentSearches.length === 0) {
        list.innerHTML = `<li class="text-sm text-gray-400 py-4 text-center">No recent searches</li>`;
        return;
      }
      list.innerHTML = recentSearches.map((term, i) => `
        <li class="flex justify-between items-center py-2.5 border-b border-gray-50 cursor-pointer group"
            onclick="fillSearch('${term.replace(/'/g, "\\'")}')">
          <span class="text-sm text-gray-700 group-hover:text-gray-900 transition-colors">${term}</span>
          <button onclick="event.stopPropagation(); removeRecent(${i})"
            class="w-6 h-6 flex items-center justify-center rounded-full bg-gray-100 text-gray-400 hover:bg-red-50 hover:text-red-400 transition-colors">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </li>
      `).join("");
    }

    function fillSearch(term) {
      searchInput.value = term;
      searchInput.dispatchEvent(new Event("input"));
    }

    function removeRecent(index) {
      recentSearches.splice(index, 1);
      localStorage.setItem("recentSearches", JSON.stringify(recentSearches));
      renderRecent();
    }

    function clearAll() {
      recentSearches = [];
      localStorage.setItem("recentSearches", JSON.stringify(recentSearches));
      renderRecent();
    }

    function saveToRecent(term) {
      if (!term) return;
      recentSearches = recentSearches.filter(t => t.toLowerCase() !== term.toLowerCase());
      recentSearches.unshift(term);
      if (recentSearches.length > 8) recentSearches = recentSearches.slice(0, 8);
      localStorage.setItem("recentSearches", JSON.stringify(recentSearches));
    }

    /* ─── Search input handler ─── */
    let searchTimer;
    searchInput.addEventListener("input", () => {
      const val = searchInput.value.trim();
      clearBtn.classList.toggle("hidden", val.length === 0);

      clearTimeout(searchTimer);
      if (val.length === 0) {
        renderRecent();
        showPanel("recent");
        return;
      }

      searchTimer = setTimeout(() => {
        const filtered = filterProducts(val, activeFilter);
        updateResultsUI(val, filtered);
      }, 200);
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const val = searchInput.value.trim();
        if (val) saveToRecent(val);
      }
    });

    /* ─── Filter products ─── */
    function filterProducts(query, brand) {
      return allProducts.filter(p => {
        const matchesQuery = p.title.toLowerCase().includes(query.toLowerCase());
        const matchesBrand = brand === "All" || p.brand === brand;
        return matchesQuery && matchesBrand;
      });
    }

    /* ─── Results UI ─── */
    function updateResultsUI(query, products) {
      if (products.length === 0) {
        showPanel("notfound");
        return;
      }

      // Update title & count
      document.getElementById("resultsTitle").textContent = `Results for "${query}"`;
      document.getElementById("resultsCount").textContent =
        `${products.length.toLocaleString()} found`;

      // Render filter pills
      renderResultFilters(query);

      // Render grid
      renderResultsGrid(products);

      showPanel("results");
    }

    function renderResultFilters(query) {
      const container = document.getElementById("resultFilters");
      container.innerHTML = filterBrands.map((brand, i) => {
        const isActive = brand === activeFilter;
        return `
          <button data-brand="${brand}"
            onclick="setFilter('${brand}', '${query.replace(/'/g, "\\'")}')"
            class="px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap border transition-all
              ${isActive
                ? "bg-gray-900 text-white border-gray-900"
                : "bg-white text-gray-500 border-gray-200 hover:border-gray-400"}">
            ${brand}
          </button>`;
      }).join("");
    }

    function setFilter(brand, query) {
      activeFilter = brand;
      const filtered = filterProducts(query, activeFilter);
      updateResultsUI(query, filtered);
    }

    function renderResultsGrid(products) {
      const grid = document.getElementById("resultsGrid");
      grid.innerHTML = products.map(p => {
        const inWishlist = wishlist.includes(p.id);
        const stars = Math.round(p.rating);
        return `
          <div class="result-card bg-[#f5f5f5] rounded-3xl p-3 cursor-pointer relative">

            <!-- Wishlist -->
            <button onclick="toggleWishlist(${p.id}, this)"
              class="absolute top-3 right-3 w-7 h-7 flex items-center justify-center rounded-full bg-white shadow-sm text-sm z-10">
              <span class="${inWishlist ? "text-red-500" : "text-gray-400"}">${inWishlist ? "♥" : "♡"}</span>
            </button>

            <!-- Image -->
            <div class="h-[95px] flex items-center justify-center overflow-hidden rounded-2xl">
              <img src="${p.image}?w=300&auto=format"
                class="h-full w-full object-cover" alt="${p.title}"
                onerror="this.src='https://via.placeholder.com/300x200?text=Shoe'">
            </div>

            <!-- Info -->
            <div class="mt-3 px-0.5">
              <h3 class="font-semibold text-xs text-gray-900 line-clamp-1">${p.title}</h3>
              <!-- Rating row -->
              <div class="flex items-center gap-1 mt-1">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="#facc15"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <span class="text-[10px] text-gray-500">${p.rating}</span>
                <span class="text-[10px] text-gray-400">| ${(p.sold || 0).toLocaleString()} sold</span>
              </div>
              <!-- Price row -->
              <div class="flex justify-between items-center mt-2">
                <p class="text-sm font-bold text-gray-900">$${p.price.toFixed(2)}</p>
                <button onclick="addToCart(${p.id}, this)"
                  class="w-7 h-7 rounded-full bg-gray-900 text-white text-lg leading-none flex items-center justify-center hover:bg-gray-700 transition-colors">
                  +
                </button>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    /* ─── Clear search ─── */
    function clearSearch() {
      searchInput.value = "";
      clearBtn.classList.add("hidden");
      activeFilter = "All";
      renderRecent();
      showPanel("recent");
    }

    /* ─── Wishlist toggle ─── */
    function toggleWishlist(id, btn) {
      if (wishlist.includes(id)) {
        wishlist = wishlist.filter(i => i !== id);
      } else {
        wishlist.push(id);
      }
      localStorage.setItem("wishlist", JSON.stringify(wishlist));
      const span = btn.querySelector("span");
      span.textContent = wishlist.includes(id) ? "♥" : "♡";
      span.className   = wishlist.includes(id) ? "text-red-500" : "text-gray-400";
    }

    /* ─── Add to cart ─── */
    function addToCart(id, btn) {
      let cart = JSON.parse(localStorage.getItem("cart") || "[]");
      const ex = cart.find(i => i.id === id);
      if (ex) { ex.qty += 1; } else { cart.push({ id, qty: 1 }); }
      localStorage.setItem("cart", JSON.stringify(cart));
      btn.textContent = "✓";
      btn.classList.replace("bg-gray-900", "bg-green-500");
      setTimeout(() => {
        btn.textContent = "+";
        btn.classList.replace("bg-green-500", "bg-gray-900");
      }, 1000);
    }

    init();
  </script>

</body>
</html>
