<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { display: none; }
    body { font-family: sans-serif; }
    .tab-underline {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: #111;
      transition: transform 0.25s ease, width 0.25s ease;
    }
    .order-card {
      transition: transform 0.15s;
    }
    .order-card:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body class="bg-[#f0f0f0] flex justify-center min-h-screen">

  <div class="w-[390px] bg-white min-h-screen relative flex flex-col overflow-hidden">

    <!-- HEADER -->
    <div class="px-5 pt-10 pb-0">
      <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-2">
          <!-- lightning bolt -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#111"><path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"/></svg>
          <h1 class="font-bold text-xl text-gray-900">My Orders</h1>
        </div>
        <div class="flex gap-2">
          <button onclick="location.href='search.html'" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          </button>
          <button class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
          </button>
        </div>
      </div>

      <!-- TABS -->
      <div class="relative flex border-b border-gray-200">
        <button id="tab-active" onclick="switchTab('active')"
          class="flex-1 pb-3 text-sm font-semibold text-gray-900 relative z-10">
          Active
        </button>
        <button id="tab-completed" onclick="switchTab('completed')"
          class="flex-1 pb-3 text-sm font-medium text-gray-400 relative z-10">
          Completed
        </button>
        <span id="tabLine" class="tab-underline" style="width:50%;transform:translateX(0%)"></span>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="flex-1 overflow-y-auto pb-28">

      <!-- EMPTY STATE -->
      <div id="emptyState" class="hidden flex-col items-center justify-center px-8 pt-16 text-center">
        <svg width="110" height="120" viewBox="0 0 110 120" fill="none" xmlns="http://www.w3.org/2000/svg" class="mb-6 opacity-75">
          <rect x="26" y="22" width="58" height="76" rx="8" fill="#e5e7eb" transform="rotate(-7 26 22)"/>
          <rect x="18" y="26" width="58" height="76" rx="8" fill="#f3f4f6"/>
          <rect x="18" y="26" width="58" height="76" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
          <rect x="34" y="18" width="26" height="16" rx="5" fill="#d1d5db"/>
          <rect x="38" y="22" width="18" height="8" rx="3" fill="#9ca3af"/>
          <rect x="28" y="50" width="38" height="3" rx="1.5" fill="#d1d5db"/>
          <rect x="28" y="60" width="28" height="3" rx="1.5" fill="#d1d5db"/>
          <rect x="28" y="70" width="34" height="3" rx="1.5" fill="#d1d5db"/>
          <!-- second clipboard behind -->
          <rect x="52" y="30" width="50" height="64" rx="8" fill="#e5e7eb" transform="rotate(5 52 30)" opacity="0.6"/>
        </svg>
        <h3 class="font-bold text-lg text-gray-900 mb-2">You don't have an order yet</h3>
        <p class="text-sm text-gray-400 leading-relaxed">You don't have an active orders at this time</p>
      </div>

      <!-- ORDERS LIST -->
      <div id="ordersList" class="hidden px-5 pt-4 flex flex-col gap-3"></div>

    </div>

    <!-- BOTTOM NAV -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[390px] bg-white border-t border-gray-100 flex justify-around items-center py-3 z-50">

      <button onclick="location.href='home.html'" class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M3 12l9-9 9 9"/><path d="M9 21V12h6v9"/></svg>
        <span class="text-[10px] text-gray-400">Home</span>
      </button>

      <button onclick="location.href='cart.html'" class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="text-[10px] text-gray-400">Cart</span>
      </button>

      <button onclick="location.href='orders.html'" class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-900"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
        <span class="text-[10px] font-semibold text-gray-900">Orders</span>
      </button>

      <button class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        <span class="text-[10px] text-gray-400">Wallet</span>
      </button>

      <button class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="text-[10px] text-gray-400">Profile</span>
      </button>

    </div>
  </div>

  <script src="./js/orders.js"></script>

</body>
</html>
