<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { display: none; }
    body { font-family: sans-serif; }
    .cart-item { transition: transform 0.15s; }
    .cart-item:active { transform: scale(0.99); }

    /* Bottom sheet modal */
    #modalOverlay {
      transition: opacity 0.25s ease;
    }
    #modalSheet {
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #modalOverlay.hidden { display: none; }
  </style>
</head>

<body class="bg-[#f0f0f0] flex justify-center min-h-screen">

  <div class="w-[390px] bg-white min-h-screen relative flex flex-col overflow-hidden">

    <!-- HEADER -->
    <div class="px-5 pt-10 pb-4">
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#111"><path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"/></svg>
          <h1 class="font-bold text-xl text-gray-900">My Cart</h1>
        </div>
        <button class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
      </div>
    </div>

    <!-- CART LIST -->
    <div id="cartList" class="flex-1 overflow-y-auto px-5 pb-36 flex flex-col gap-3"></div>

    <!-- EMPTY STATE -->
    <div id="emptyState" class="hidden flex-col items-center justify-center flex-1 pb-32 text-center px-8">
      <svg width="90" height="90" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.2" class="mb-4">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <h3 class="font-bold text-lg text-gray-800 mb-2">Your cart is empty</h3>
      <p class="text-sm text-gray-400">Add some shoes and they'll appear here</p>
      <button onclick="location.href='home.html'"
        class="mt-6 px-8 py-3 bg-gray-900 text-white text-sm font-semibold rounded-full hover:bg-gray-700 transition-colors">
        Shop Now
      </button>
    </div>

    <!-- Checkout bar -->
      <div id="checkoutBar" class="px-5 pb-20 pt-1 flex items-center justify-between">
        <div>
          <p class="text-[11px] text-gray-400 font-medium">Total price</p>
          <p id="totalPrice" class="text-xl font-bold text-gray-900">$0.00</p>
        </div>
        <button  onclick="location.href='checkout.html'"
          class="flex items-center gap-2 bg-gray-900 text-white px-7 py-3.5 rounded-full text-sm font-semibold hover:bg-gray-700 transition-colors">
          Checkout
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

    <!-- FOOTER: Total + Checkout -->
    <div id="cartFooter" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[390px] bg-white z-40">
      <!-- Bottom Nav -->
      <div class="border-t border-gray-100 flex justify-around items-center py-3">

        <button onclick="location.href='home.html'" class="flex flex-col items-center gap-0.5">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M3 12l9-9 9 9"/><path d="M9 21V12h6v9"/></svg>
          <span class="text-[10px] text-gray-400">Home</span>
        </button>

        <button onclick="location.href='cart.html'" class="flex flex-col items-center gap-0.5">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" class="text-gray-900"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/></svg>
          <span class="text-[10px] font-semibold text-gray-900">Cart</span>
        </button>

        <button onclick="location.href='orders.html'" class="flex flex-col items-center gap-0.5">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
          <span class="text-[10px] text-gray-400">Orders</span>
        </button>

        <button class="flex flex-col items-center gap-0.5">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          <span class="text-[10px] text-gray-400">Wallet</span>
        </button>

        <button class="flex flex-col items-center gap-0.5">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="text-[10px] text-gray-400">Profile</span>
        </button>

      </div>

      
    </div>

  </div>

  <!-- REMOVE MODAL OVERLAY -->
  <div id="modalOverlay" class="hidden fixed inset-0 z-50 flex items-end justify-center">
    <!-- Dark backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]" onclick="closeModal()"></div>

    <!-- Bottom sheet -->
    <div id="modalSheet"
      class="relative w-[390px] bg-white rounded-t-3xl px-6 pt-6 pb-10 z-10 translate-y-full">

      <h2 class="text-center font-bold text-lg text-gray-900 mb-5">Remove From Cart?</h2>

      <!-- Product preview in modal -->
      <div class="flex items-center gap-4 bg-gray-50 rounded-2xl p-4 mb-6">
        <div class="w-[80px] h-[70px] rounded-xl bg-gray-200 overflow-hidden flex-shrink-0">
          <img id="modalImg" src="" alt="" class="w-full h-full object-cover">
        </div>
        <div class="flex-1 min-w-0">
          <h3 id="modalTitle" class="font-semibold text-sm text-gray-900 line-clamp-1"></h3>
          <div class="flex items-center gap-1 mt-1">
            <span id="modalColorDot" class="w-3 h-3 rounded-full border border-gray-200 flex-shrink-0"></span>
            <span id="modalColorName" class="text-[11px] text-gray-400"></span>
            <span class="text-gray-300 text-[11px]">|</span>
            <span id="modalSize" class="text-[11px] text-gray-400"></span>
          </div>
          <div class="flex items-center justify-between mt-2">
            <p id="modalPrice" class="font-bold text-sm text-gray-900"></p>
            <!-- mini qty -->
            <div class="flex items-center gap-2 bg-white border border-gray-200 rounded-full px-3 py-1">
              <span class="text-sm text-gray-500">−</span>
              <span id="modalQty" class="text-sm font-semibold text-gray-900 min-w-[12px] text-center"></span>
              <span class="text-sm text-gray-500">+</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex gap-3">
        <button onclick="closeModal()"
          class="flex-1 py-4 rounded-full border border-gray-200 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors">
          Cancel
        </button>
        <button onclick="confirmRemove()"
          class="flex-1 py-4 rounded-full bg-gray-900 text-white text-sm font-semibold hover:bg-gray-700 transition-colors">
          Yes, Remove
        </button>
      </div>

    </div>
  </div>

  <script src="./js/cart.js"></script>

</body>
</html>
