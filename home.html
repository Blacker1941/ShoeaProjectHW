<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoe App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { display: none; }
    body { font-family: sans-serif; }
    .filter-btn { transition: all 0.2s; }
    #filters { scrollbar-width: none; -ms-overflow-style: none; }
  </style>
</head>

<body class="bg-[#f0f0f0] flex justify-center min-h-screen">

  <div class="w-[390px] bg-white min-h-screen relative overflow-hidden">

    <!-- HEADER -->
    <div class="px-5 pt-10 pb-1">
      <div class="flex justify-between items-center">

        <div class="flex items-center gap-3">
          <img src="https://i.pravatar.cc/100"
            class="w-11 h-11 rounded-full object-cover">
          <div>
            <p class="text-xs text-gray-400 font-normal">Good Morning 👋</p>
            <h2 class="font-bold text-sm text-gray-900">Saeed Abdilar</h2>
          </div>
        </div>

        <div class="flex gap-3 items-center">
          <button class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 text-base">🔔</button>
          <button class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 text-base">♡</button>
        </div>

      </div>

      <!-- SEARCH -->
      <div class="relative mt-4">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
        <input onclick="location.href='search.html'" id="search" type="text" placeholder="Search"
          class="w-full bg-gray-100 rounded-2xl pl-10 pr-4 py-3 outline-none text-sm text-gray-700 placeholder-gray-400">
      </div>

      <!-- BRANDS -->
      <div id="brands" class="grid grid-cols-4 gap-x-2 gap-y-4 mt-5"></div>

    </div>

    <!-- MOST POPULAR TITLE -->
    <div class="px-5 mt-6">
      <div class="flex justify-between items-center">
        <h2 class="font-bold text-lg text-gray-900">Most Popular</h2>
        <button onclick="location.href='popular.html'"
          class="text-xs text-gray-500 font-medium">See All</button>
      </div>

      <!-- FILTERS -->
      <div id="filters" class="flex gap-2 mt-3 overflow-x-auto pb-1"></div>
    </div>

    <!-- PRODUCTS GRID -->
    <div id="products" class="grid grid-cols-2 gap-3 px-5 mt-4 pb-28"></div>

    <!-- BOTTOM NAV -->
    <!-- BOTTOM NAV -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[390px] bg-white border-t border-gray-100 flex justify-around items-center py-3 z-50">
 
      <button onclick="location.href='home.html'" class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" class="text-gray-900"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span class="text-[10px] font-medium text-gray-900">Home</span>
      </button>
 
      <button class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="text-[10px] text-gray-400">Cart</span>
      </button>
 
      <button onclick="location.href='orders.html'" class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
        <span class="text-[10px] text-gray-400">Orders</span>
      </button>
 
      <button class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        <span class="text-[10px] text-gray-400">Wallet</span>
      </button>
 
      <button class="flex flex-col items-center gap-0.5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="text-[10px] text-gray-400">Profile</span>
      </button>
 
    </div>

  </div>

  <script src="./js/home.js"></script>
</body>

</html>
